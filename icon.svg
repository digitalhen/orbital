<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#1a1e3a"/>
    </linearGradient>
    <linearGradient id="moon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e8f0"/>
      <stop offset="100%" stop-color="#b8b8c8"/>
    </linearGradient>
    <linearGradient id="earth" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4fa4e0"/>
      <stop offset="100%" stop-color="#2563a8"/>
    </linearGradient>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0"/>
      <stop offset="40%" stop-color="#ff6b35" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffaa44" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="80" cy="90" r="2" fill="white" opacity="0.7"/>
  <circle cx="430" cy="70" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="60" cy="300" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="450" cy="250" r="2" fill="white" opacity="0.4"/>
  <circle cx="150" cy="60" r="1" fill="white" opacity="0.5"/>
  <circle cx="380" cy="440" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="100" cy="430" r="1" fill="white" opacity="0.4"/>
  <circle cx="300" cy="55" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="460" cy="380" r="1" fill="white" opacity="0.3"/>
  <circle cx="50" cy="190" r="1" fill="white" opacity="0.5"/>
  <circle cx="200" cy="450" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="350" cy="130" r="1" fill="white" opacity="0.5"/>

  <!-- Trajectory arc (figure-eight free return) -->
  <path d="M 140 310 Q 180 140 320 160 Q 420 175 400 270 Q 385 340 370 320"
        fill="none" stroke="url(#trail)" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="6 8"/>

  <!-- Earth -->
  <circle cx="140" cy="330" r="65" fill="url(#earth)"/>
  <!-- Earth land masses (simplified) -->
  <path d="M 110 310 Q 120 295 140 300 Q 155 305 150 320 Q 145 330 130 325 Z"
        fill="#3da85a" opacity="0.7"/>
  <path d="M 155 340 Q 170 335 175 345 Q 170 355 160 350 Z"
        fill="#3da85a" opacity="0.6"/>
  <!-- Earth atmosphere glow -->
  <circle cx="140" cy="330" r="68" fill="none" stroke="#6bc4ff" stroke-width="2" opacity="0.3"/>

  <!-- Moon -->
  <circle cx="380" cy="190" r="45" fill="url(#moon)"/>
  <!-- Moon craters -->
  <circle cx="370" cy="180" r="8" fill="#a0a0b0" opacity="0.4"/>
  <circle cx="395" cy="200" r="5" fill="#a0a0b0" opacity="0.3"/>
  <circle cx="375" cy="205" r="4" fill="#a8a8b8" opacity="0.3"/>
  <circle cx="360" cy="195" r="3" fill="#a0a0b0" opacity="0.25"/>

  <!-- Spacecraft (small triangle/diamond at end of trajectory) -->
  <g transform="translate(370, 315) rotate(-50)">
    <!-- Engine glow -->
    <ellipse cx="0" cy="14" rx="4" ry="10" fill="#ff6b35" opacity="0.6"/>
    <ellipse cx="0" cy="12" rx="2.5" ry="6" fill="#ffcc44" opacity="0.8"/>
    <!-- Capsule body -->
    <path d="M 0 -12 L 7 6 L 4 10 L -4 10 L -7 6 Z" fill="#d0d0e0" stroke="#888" stroke-width="0.5"/>
    <!-- Service module -->
    <rect x="-5" y="6" width="10" height="4" rx="1" fill="#aab0c0"/>
    <!-- Solar panels -->
    <rect x="-16" y="5" width="10" height="3" rx="0.5" fill="#2255aa" stroke="#4477cc" stroke-width="0.3"/>
    <rect x="6" y="5" width="10" height="3" rx="0.5" fill="#2255aa" stroke="#4477cc" stroke-width="0.3"/>
  </g>

</svg>
